name: Build MineMod

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Clean cache
        run: rm -rf ~/.gradle/caches ~/.gradle/wrapper

      - name: Build
        run: ./gradlew build --stacktrace --no-daemon --refresh-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: minemod
          path: build/libs/*.jar
