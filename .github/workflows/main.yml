name: Build Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 💀 FIX QUAN TRỌNG NHẤT: Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Give permission
        run: chmod +x gradlew

      - name: Clean cache
        run: rm -rf ~/.gradle/caches ~/.gradle/wrapper || true

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # 📦 LẤY FILE BUILD ĐƯA VÀO ARTIFACT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: build/libs/*.jar
