name: Build MineMod

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Forge 1.16.5 chạy ổn nhất với Java 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # cache sạch để tránh ForgeGradle lỗi lạ
      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches ~/.gradle/wrapper || true

      - name: Grant permission
        run: chmod +x gradlew

      # build chuẩn + debug nếu fail
      - name: Build with Gradle
        run: ./gradlew build --stacktrace --no-daemon --refresh-dependencies

      # upload file jar
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minemod
          path: build/libs/*.jar
