name: Build MineMod

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Clean Gradle cache (avoid ForgeGradle weird bugs)
        run: rm -rf ~/.gradle/caches ~/.gradle/wrapper || true

      - name: Build with Gradle
        run: ./gradlew build --stacktrace --no-daemon --refresh-dependencies

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minemod
          path: build/libs/*.jar
